name: Norminette 42

on:
  push:
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - 'meson.build'
      - 'Makefile'
      - 'README.md'
      - 'shell.nix'
      - '.envrc'
      - 'flake.nix'
      - 'flake.lock'

jobs:
  norminette:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python3 -m pip install -U norminette
      - name: Norminette "libft"
        run: norminette ${{ github.workspace }}/subprojects/libft
      - name: Norminette "minishell"
        shell: bash
        run: |
          set -o pipefail
          (norminette src/ includes/ || true) | grep -E ".+\.[ch]: Error\!|^Error:" && exit 1 || exit 0
